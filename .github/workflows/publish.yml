name: Publish to npm

# Release flow (monorepo — the published package lives in packages/core):
#   1. Bump packages/core/package.json version on a PR and merge to main.
#   2. Tag the merge commit: `git tag core-v1.2.0 && git push origin core-v1.2.0`
#      (the version after the prefix must equal packages/core/package.json
#      version, or the job fails).
# The core-v prefix is deliberate: the app's release flow (main.yml ->
# draft-release) creates plain v<MAJ.MIN.RUN> tags when a release is
# published, and those must not fire an npm publish.
#
# Tests are skipped: they already ran on the PR (release-time jobs trust PR
# validation per the org CI/CD convention).

on:
  push:
    tags:
      - "core-v*"

jobs:
  publish:
    uses: Volare-Consulting-Software/.github/.github/workflows/publish-npm-public.yml@main
    with:
      node-version: "20"
      working-directory: "packages/core"
      tag-prefix: core-v
      skip-tests: true
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
