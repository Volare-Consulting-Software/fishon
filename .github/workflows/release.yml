name: release

# Publishing a release ships it: promote the released image to :latest
# (registry-side, no rebuild), then deploy it to the Lambda via
# update-function-code. Prereleases are reserved for a future staging tier.

on:
  release:
    types: [released]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  promote-latest:
    uses: Volare-Consulting-Software/.github/.github/workflows/push-container-image.yml@main
    secrets: inherit
    with:
      registry: ecr
      aws-region: us-east-2
      image-name: fishon
      source-tag: ${{ github.event.release.tag_name }}
      dest-tags: latest

  deploy:
    needs: promote-latest
    uses: Volare-Consulting-Software/.github/.github/workflows/deploy-aws-lambda.yml@main
    secrets: inherit
    with:
      function-name: fishon
      image-name: fishon
      image-tag: ${{ github.event.release.tag_name }}
      aws-region: us-east-2
