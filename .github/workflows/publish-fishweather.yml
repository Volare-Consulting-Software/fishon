name: Publish fishweather-forecast to npm

# Release: bump the version, merge to main, then tag the commit:
#   git tag v1.0.8 && git push origin v1.0.8
# The tag (which must equal package.json version) runs the org's shared
# public-npm publish workflow. Tests are skipped here because the suite needs
# a Playwright browser the publish job doesn't provision.

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    uses: Volare-Consulting-Software/.github/.github/workflows/publish-npm-public.yml@main
    with:
      node-version: "20"
      skip-tests: true
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
